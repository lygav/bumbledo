<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      line-height: 1.5;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 1.5rem;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #111;
    }

    /* Input area */
    .input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .input-row label {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    #todo-input {
      flex: 1;
      padding: 0.625rem 0.75rem;
      font-size: 1rem;
      font-family: inherit;
      border: 2px solid #ccc;
      border-radius: 6px;
      background: #fff;
      color: #1a1a1a;
      transition: border-color 0.15s;
    }

    #todo-input:focus {
      outline: none;
      border-color: #4a90d9;
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.25);
    }

    #add-btn {
      padding: 0.625rem 1.25rem;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      min-width: 44px;
      min-height: 44px;
      transition: background 0.15s;
    }

    #add-btn:hover {
      background: #3a7bc8;
    }

    #add-btn:focus-visible {
      outline: 2px solid #4a90d9;
      outline-offset: 2px;
    }

    /* Todo list */
    #todo-list {
      list-style: none;
      margin-bottom: 1.5rem;
    }

    #todo-list li {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #fff;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      margin-bottom: 0.375rem;
      border: 1px solid #e0e0e0;
      transition: box-shadow 0.15s, opacity 0.15s;
      flex-wrap: wrap;
    }

    #todo-list li:hover {
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }

    /* Drag handle */
    .drag-handle {
      cursor: grab;
      color: #bbb;
      font-size: 1.125rem;
      line-height: 1;
      padding: 0.25rem;
      user-select: none;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .drag-handle:hover {
      color: #888;
    }

    /* Status select */
    .todo-status {
      font-size: 0.8125rem;
      font-family: inherit;
      padding: 0.25rem 0.375rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      color: #1a1a1a;
      cursor: pointer;
      width: 100px;
      flex-shrink: 0;
      min-height: 44px;
      transition: border-color 0.15s;
    }

    .todo-status:focus-visible {
      outline: 2px solid #4a90d9;
      outline-offset: 2px;
    }

    .todo-status:hover {
      border-color: #888;
    }

    /* Todo text */
    .todo-text {
      flex: 1;
      font-size: 1rem;
      word-break: break-word;
    }

    /* Status: done */
    #todo-list li.status-done {
      opacity: 0.6;
    }
    #todo-list li.status-done .todo-text {
      text-decoration: line-through;
      color: #999;
    }

    /* Status: cancelled */
    #todo-list li.status-cancelled {
      opacity: 0.5;
    }
    #todo-list li.status-cancelled .todo-text {
      text-decoration: line-through;
      color: #c0392b;
    }

    /* Status: blocked */
    #todo-list li.status-blocked {
      border-left: 3px solid #e67e22;
      background: #fffbf0;
    }

    /* Delete button */
    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.25rem;
      cursor: pointer;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      font-family: inherit;
    }

    .delete-btn:hover {
      color: #e74c3c;
      background: rgba(231, 76, 60, 0.08);
    }

    .delete-btn:focus-visible {
      outline: 2px solid #4a90d9;
      outline-offset: 2px;
      color: #e74c3c;
    }

    #todo-list li:hover .delete-btn,
    #todo-list li:focus-within .delete-btn {
      color: #999;
    }

    #todo-list li:hover .delete-btn:hover {
      color: #e74c3c;
    }

    /* Empty state */
    #empty-state {
      text-align: center;
      color: #888;
      padding: 2rem 1rem;
      font-size: 1rem;
    }

    /* Footer */
    footer {
      text-align: center;
    }

    #clear-finished-btn {
      padding: 0.5rem 1.25rem;
      font-size: 0.875rem;
      font-family: inherit;
      font-weight: 600;
      background: #fff;
      color: #555;
      border: 1px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      min-height: 44px;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    #clear-finished-btn:hover:not(:disabled) {
      background: #f0f0f0;
      border-color: #999;
      color: #333;
    }

    #clear-finished-btn:focus-visible {
      outline: 2px solid #4a90d9;
      outline-offset: 2px;
    }

    #clear-finished-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Drag-and-drop states */
    #todo-list li.dragging {
      opacity: 0.4;
    }

    #todo-list li.drag-over-above {
      box-shadow: 0 -2px 0 0 #4a90d9;
    }

    #todo-list li.drag-over-below {
      box-shadow: 0 2px 0 0 #4a90d9;
    }

    body.is-dragging * {
      cursor: grabbing !important;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    /* Blocked-by subtitle */
    .blocked-by-text {
      font-size: 0.75rem;
      color: #b07020;
      margin-top: 0.125rem;
      font-style: italic;
    }

    /* Blocker picker panel */
    .blocker-picker {
      margin-top: 0.375rem;
      padding: 0.5rem 0.75rem;
      background: #fffbf0;
      border: 1px solid #e6d5b8;
      border-radius: 4px;
      font-size: 0.8125rem;
    }

    .blocker-picker-title {
      font-weight: 600;
      color: #8a6d3b;
      margin-bottom: 0.375rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .blocker-picker label {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.25rem 0;
      cursor: pointer;
      color: #555;
    }

    .blocker-picker label:hover {
      color: #1a1a1a;
    }

    .blocker-picker input[type="checkbox"] {
      min-width: 16px;
      min-height: 16px;
      cursor: pointer;
    }

    .blocker-picker .no-blockers-msg {
      color: #999;
      font-style: italic;
    }

    .blocker-picker,
    .blocked-by-text {
      width: 100%;
      flex-basis: 100%;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Todos</h1>
    </header>

    <main>
      <form class="input-row" id="add-form" aria-label="Add a new todo">
        <label for="todo-input">New todo</label>
        <input
          type="text"
          id="todo-input"
          placeholder="What needs to be done?"
          autocomplete="off"
        >
        <button type="submit" id="add-btn">Add</button>
      </form>

      <p id="empty-state" role="status">No todos yet. Add one above!</p>

      <ul id="todo-list" aria-label="Todo list"></ul>
    </main>

    <footer>
      <button type="button" id="clear-finished-btn" disabled>Clear finished</button>
    </footer>
  </div>

  <script>
    (function () {
      const STORAGE_KEY = 'todos';
      const todoList = document.getElementById('todo-list');
      const todoInput = document.getElementById('todo-input');
      const addForm = document.getElementById('add-form');
      const emptyState = document.getElementById('empty-state');
      const clearFinishedBtn = document.getElementById('clear-finished-btn');

      function generateId() {
        return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
      }

      function migrateTodos(list) {
        return list.map(t => {
          if ('done' in t && !('status' in t)) {
            const { done, ...rest } = t;
            return { ...rest, status: done ? 'done' : 'active' };
          }
          if (!('status' in t)) {
            return { ...t, status: 'active' };
          }
          if (t.status === 'blocked' && !Array.isArray(t.blockedBy)) {
            return { ...t, blockedBy: [] };
          }
          return t;
        });
      }

      function loadTodos() {
        try {
          const data = localStorage.getItem(STORAGE_KEY);
          const parsed = data ? JSON.parse(data) : [];
          return migrateTodos(parsed);
        } catch {
          return [];
        }
      }

      function saveTodos(todosToSave) {
        const clean = todosToSave.map(t => {
          const obj = { id: t.id, text: t.text, status: t.status };
          if (t.status === 'blocked' && Array.isArray(t.blockedBy) && t.blockedBy.length > 0) {
            obj.blockedBy = t.blockedBy;
          }
          return obj;
        });
        localStorage.setItem(STORAGE_KEY, JSON.stringify(clean));
      }

      let todos = loadTodos();
      saveTodos(todos); // persist migrated format

      function render() {
        todoList.innerHTML = '';

        const hasFinished = todos.some(t => t.status === 'done' || t.status === 'cancelled');
        clearFinishedBtn.disabled = !hasFinished;
        emptyState.hidden = todos.length > 0;

        todos.forEach(todo => {
          const li = document.createElement('li');
          li.draggable = true;
          li.dataset.id = todo.id;
          if (todo.status !== 'active') li.classList.add('status-' + todo.status);

          const handle = document.createElement('span');
          handle.className = 'drag-handle';
          handle.setAttribute('aria-hidden', 'true');
          handle.textContent = '⠿';

          const select = document.createElement('select');
          select.className = 'todo-status';
          select.setAttribute('aria-label', `Status for "${todo.text}"`);
          const statusOptions = [
            { value: 'active', label: '— None —' },
            { value: 'done', label: 'Done' },
            { value: 'cancelled', label: 'Cancelled' },
            { value: 'blocked', label: 'Blocked' }
          ];
          statusOptions.forEach(s => {
            const opt = document.createElement('option');
            opt.value = s.value;
            opt.textContent = s.label;
            if (s.value === todo.status) opt.selected = true;
            select.appendChild(opt);
          });
          if (todo.status === 'active') {
            select.style.color = '#999';
          } else {
            select.style.color = '#1a1a1a';
          }
          select.addEventListener('change', () => setStatus(todo.id, select.value));

          const text = document.createElement('span');
          text.className = 'todo-text';
          text.textContent = todo.text;

          const deleteBtn = document.createElement('button');
          deleteBtn.type = 'button';
          deleteBtn.className = 'delete-btn';
          deleteBtn.setAttribute('aria-label', `Delete "${todo.text}"`);
          deleteBtn.textContent = '×';
          deleteBtn.addEventListener('click', () => deleteTodo(todo.id));

          li.append(handle, select, text, deleteBtn);

          if (todo.status === 'blocked') {
            if (Array.isArray(todo.blockedBy) && todo.blockedBy.length > 0) {
              const blockerNames = todo.blockedBy
                .map(bid => {
                  const blocker = todos.find(t => t.id === bid);
                  if (!blocker) return null;
                  return blocker.text.length > 30 ? blocker.text.slice(0, 30) + '…' : blocker.text;
                })
                .filter(Boolean);

              if (blockerNames.length > 0) {
                let displayText;
                if (blockerNames.length <= 3) {
                  displayText = 'Blocked by: ' + blockerNames.join(', ');
                } else {
                  displayText = 'Blocked by: ' + blockerNames.slice(0, 2).join(', ') + ' + ' + (blockerNames.length - 2) + ' more';
                }
                const subtitle = document.createElement('div');
                subtitle.className = 'blocked-by-text';
                subtitle.textContent = displayText;
                li.appendChild(subtitle);
              }
            }

            const picker = document.createElement('div');
            picker.className = 'blocker-picker';

            const pickerTitle = document.createElement('div');
            pickerTitle.className = 'blocker-picker-title';
            pickerTitle.textContent = 'Blocked by:';
            picker.appendChild(pickerTitle);

            const eligible = todos.filter(t => t.id !== todo.id && (t.status === 'active' || t.status === 'blocked'));

            if (eligible.length === 0) {
              const msg = document.createElement('div');
              msg.className = 'no-blockers-msg';
              msg.textContent = 'No other tasks to select.';
              picker.appendChild(msg);
            } else {
              eligible.forEach(t => {
                const label = document.createElement('label');
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.checked = Array.isArray(todo.blockedBy) && todo.blockedBy.includes(t.id);
                cb.addEventListener('change', () => toggleBlocker(todo.id, t.id));

                const labelText = document.createElement('span');
                const truncated = t.text.length > 40 ? t.text.slice(0, 40) + '…' : t.text;
                labelText.textContent = truncated;

                label.append(cb, labelText);
                picker.appendChild(label);
              });
            }

            li.appendChild(picker);
          }

          todoList.appendChild(li);
        });
      }

      function addTodo(text) {
        const trimmed = text.trim();
        if (!trimmed) return;
        todos.push({ id: generateId(), text: trimmed, status: 'active' });
        saveTodos(todos);
        render();
      }

      function setStatus(id, newStatus) {
        const todo = todos.find(t => t.id === id);
        if (todo) {
          todo.status = newStatus;
          if (newStatus === 'blocked') {
            if (!Array.isArray(todo.blockedBy)) todo.blockedBy = [];
          } else {
            delete todo.blockedBy;
          }
          if (newStatus === 'done' || newStatus === 'cancelled') {
            cleanupBlockedBy(id);
          }
          saveTodos(todos);
          render();
        }
      }

      function toggleBlocker(todoId, blockerId) {
        const todo = todos.find(t => t.id === todoId);
        if (!todo || todo.status !== 'blocked') return;
        if (!Array.isArray(todo.blockedBy)) todo.blockedBy = [];

        const idx = todo.blockedBy.indexOf(blockerId);
        if (idx >= 0) {
          todo.blockedBy.splice(idx, 1);
          if (todo.blockedBy.length === 0) {
            todo.status = 'active';
            delete todo.blockedBy;
          }
        } else {
          todo.blockedBy.push(blockerId);
        }
        saveTodos(todos);
        render();
      }

      function cleanupBlockedBy(removedId) {
        todos.forEach(t => {
          if (t.status === 'blocked' && Array.isArray(t.blockedBy)) {
            t.blockedBy = t.blockedBy.filter(id => id !== removedId);
            if (t.blockedBy.length === 0) {
              t.status = 'active';
              delete t.blockedBy;
            }
          }
        });
      }

      function deleteTodo(id) {
        todos = todos.filter(t => t.id !== id);
        cleanupBlockedBy(id);
        saveTodos(todos);
        render();
      }

      function clearFinished() {
        const removedIds = todos.filter(t => t.status === 'done' || t.status === 'cancelled').map(t => t.id);
        todos = todos.filter(t => t.status !== 'done' && t.status !== 'cancelled');
        removedIds.forEach(id => cleanupBlockedBy(id));
        saveTodos(todos);
        render();
      }

      addForm.addEventListener('submit', e => {
        e.preventDefault();
        addTodo(todoInput.value);
        todoInput.value = '';
        todoInput.focus();
      });

      clearFinishedBtn.addEventListener('click', clearFinished);

      /* --- Drag-and-drop reordering --- */
      let draggedId = null;

      todoList.addEventListener('dragstart', e => {
        const li = e.target.closest('li[data-id]');
        if (!li) return;
        draggedId = li.dataset.id;
        li.classList.add('dragging');
        document.body.classList.add('is-dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', draggedId);
      });

      todoList.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';

        const li = e.target.closest('li[data-id]');
        if (!li || li.dataset.id === draggedId) return;

        // Clear previous indicators
        todoList.querySelectorAll('.drag-over-above, .drag-over-below').forEach(el => {
          el.classList.remove('drag-over-above', 'drag-over-below');
        });

        // Determine if cursor is in top or bottom half
        const rect = li.getBoundingClientRect();
        const midY = rect.top + rect.height / 2;
        if (e.clientY < midY) {
          li.classList.add('drag-over-above');
        } else {
          li.classList.add('drag-over-below');
        }
      });

      todoList.addEventListener('dragleave', e => {
        const li = e.target.closest('li[data-id]');
        if (li && !li.contains(e.relatedTarget)) {
          li.classList.remove('drag-over-above', 'drag-over-below');
        }
      });

      todoList.addEventListener('drop', e => {
        e.preventDefault();
        const targetLi = e.target.closest('li[data-id]');
        if (!targetLi || !draggedId) return;

        const fromIndex = todos.findIndex(t => t.id === draggedId);
        const targetId = targetLi.dataset.id;
        if (draggedId === targetId) return;

        // Determine insertion above or below target
        const rect = targetLi.getBoundingClientRect();
        const insertAfter = e.clientY >= rect.top + rect.height / 2;

        // Remove dragged item
        const [moved] = todos.splice(fromIndex, 1);

        // Find new target index (may have shifted after splice)
        let toIndex = todos.findIndex(t => t.id === targetId);
        if (insertAfter) toIndex += 1;

        todos.splice(toIndex, 0, moved);
        saveTodos(todos);
        render();
      });

      todoList.addEventListener('dragend', () => {
        draggedId = null;
        document.body.classList.remove('is-dragging');
        todoList.querySelectorAll('.dragging, .drag-over-above, .drag-over-below').forEach(el => {
          el.classList.remove('dragging', 'drag-over-above', 'drag-over-below');
        });
      });

      render();
    })();
  </script>
</body>
</html>
