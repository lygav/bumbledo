<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      line-height: 1.5;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 1.5rem;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #111;
    }

    /* Input area */
    .input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .input-row label {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    #todo-input {
      flex: 1;
      padding: 0.625rem 0.75rem;
      font-size: 1rem;
      font-family: inherit;
      border: 2px solid #ccc;
      border-radius: 6px;
      background: #fff;
      color: #1a1a1a;
      transition: border-color 0.15s;
    }

    #todo-input:focus {
      outline: none;
      border-color: #4a90d9;
      box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.25);
    }

    #add-btn {
      padding: 0.625rem 1.25rem;
      font-size: 1rem;
      font-family: inherit;
      font-weight: 600;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      min-width: 44px;
      min-height: 44px;
      transition: background 0.15s;
    }

    #add-btn:hover {
      background: #3a7bc8;
    }

    #add-btn:focus-visible {
      outline: 2px solid #4a90d9;
      outline-offset: 2px;
    }

    /* Todo list */
    #todo-list {
      list-style: none;
      margin-bottom: 1.5rem;
    }

    #todo-list li {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #fff;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      margin-bottom: 0.375rem;
      border: 1px solid #e0e0e0;
      transition: box-shadow 0.15s, opacity 0.15s;
      flex-wrap: wrap;
    }

    #todo-list li:hover {
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }

    #todo-list li.task-row-selected {
      box-shadow: 0 0 0 2px rgba(74, 144, 217, 0.45);
      border-color: #4a90d9;
    }

    #todo-list li.task-row-flash {
      animation: task-row-flash 1.4s ease;
    }

    /* Drag handle */
    .drag-handle {
      cursor: grab;
      color: #bbb;
      font-size: 1.125rem;
      line-height: 1;
      padding: 0.25rem;
      user-select: none;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .drag-handle:hover {
      color: #888;
    }

    /* Status select */
    .todo-status {
      font-size: 0.8125rem;
      font-family: inherit;
      padding: 0.25rem 0.375rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      color: #1a1a1a;
      cursor: pointer;
      width: 100px;
      flex-shrink: 0;
      min-height: 44px;
      transition: border-color 0.15s;
    }

    .todo-status:focus-visible {
      outline: 2px solid #4a90d9;
      outline-offset: 2px;
    }

    .todo-status:hover {
      border-color: #888;
    }

    /* Todo text */
    .todo-text {
      flex: 1;
      font-size: 1rem;
      word-break: break-word;
    }

    /* Status: done */
    #todo-list li.status-done {
      opacity: 0.6;
    }
    #todo-list li.status-done .todo-text {
      text-decoration: line-through;
      color: #999;
    }

    /* Status: cancelled */
    #todo-list li.status-cancelled {
      opacity: 0.5;
    }
    #todo-list li.status-cancelled .todo-text {
      text-decoration: line-through;
      color: #c0392b;
    }

    /* Status: blocked */
    #todo-list li.status-blocked {
      border-left: 3px solid #e67e22;
      background: #fffbf0;
    }

    /* Delete button */
    .delete-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.25rem;
      cursor: pointer;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
      font-family: inherit;
    }

    .delete-btn:hover {
      color: #e74c3c;
      background: rgba(231, 76, 60, 0.08);
    }

    .delete-btn:focus-visible {
      outline: 2px solid #4a90d9;
      outline-offset: 2px;
      color: #e74c3c;
    }

    #todo-list li:hover .delete-btn,
    #todo-list li:focus-within .delete-btn {
      color: #999;
    }

    #todo-list li:hover .delete-btn:hover {
      color: #e74c3c;
    }

    /* Empty state */
    #empty-state {
      text-align: center;
      color: #888;
      padding: 2rem 1rem;
      font-size: 1rem;
    }

    /* Footer */
    footer {
      text-align: center;
    }

    #clear-finished-btn {
      padding: 0.5rem 1.25rem;
      font-size: 0.875rem;
      font-family: inherit;
      font-weight: 600;
      background: #fff;
      color: #555;
      border: 1px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
      min-height: 44px;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    #clear-finished-btn:hover:not(:disabled) {
      background: #f0f0f0;
      border-color: #999;
      color: #333;
    }

    #clear-finished-btn:focus-visible {
      outline: 2px solid #4a90d9;
      outline-offset: 2px;
    }

    #clear-finished-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Drag-and-drop states */
    #todo-list li.dragging {
      opacity: 0.4;
    }

    #todo-list li.drag-over-above {
      box-shadow: 0 -2px 0 0 #4a90d9;
    }

    #todo-list li.drag-over-below {
      box-shadow: 0 2px 0 0 #4a90d9;
    }

    body.is-dragging * {
      cursor: grabbing !important;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    /* Blocked-by subtitle */
    .blocked-by-text {
      font-size: 0.75rem;
      color: #b07020;
      margin-top: 0.125rem;
      font-style: italic;
    }

    /* Blocker picker panel */
    .blocker-picker {
      margin-top: 0.375rem;
      padding: 0.5rem 0.75rem;
      background: #fffbf0;
      border: 1px solid #e6d5b8;
      border-radius: 4px;
      font-size: 0.8125rem;
    }

    .blocker-picker-title {
      font-weight: 600;
      color: #8a6d3b;
      margin-bottom: 0.375rem;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .blocker-picker label {
      display: flex;
      align-items: center;
      gap: 0.375rem;
      padding: 0.25rem 0;
      cursor: pointer;
      color: #555;
    }

    .blocker-picker label:hover {
      color: #1a1a1a;
    }

    .blocker-picker input[type="checkbox"] {
      min-width: 16px;
      min-height: 16px;
      cursor: pointer;
    }

    .blocker-picker .no-blockers-msg {
      color: #999;
      font-style: italic;
    }

    .blocker-picker,
    .blocked-by-text {
      width: 100%;
      flex-basis: 100%;
    }

    #dependency-graph-section {
      width: min(1200px, calc(100vw - 2rem));
      margin: 1.25rem auto 0;
      position: relative;
      left: 50%;
      transform: translateX(-50%);
    }

    .dependency-graph-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.75rem;
    }

    .dependency-graph-title-group h2 {
      font-size: 1.125rem;
      font-weight: 700;
      color: #111;
    }

    .dependency-graph-helper {
      margin-top: 0.125rem;
      font-size: 0.875rem;
      color: #666;
    }

    #dag-toggle {
      padding: 0.5rem 0.85rem;
      font-size: 0.875rem;
      font-family: inherit;
      font-weight: 600;
      color: #4a90d9;
      background: #fff;
      border: 1px solid #cfe0f5;
      border-radius: 999px;
      cursor: pointer;
      min-height: 40px;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    #dag-toggle:hover:not(:disabled) {
      background: #f4f8fd;
      border-color: #4a90d9;
    }

    #dag-toggle:focus-visible {
      outline: 2px solid #4a90d9;
      outline-offset: 2px;
    }

    #dag-toggle:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    #dependency-graph {
      width: 100%;
      min-height: 220px;
      height: min(360px, 45vh);
      max-height: 360px;
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
    }

    #dag-empty-state {
      min-height: 128px;
      padding: 1rem 1.25rem;
      background: #fff;
      border: 1px dashed #d9d9d9;
      border-radius: 8px;
      color: #6f6f6f;
      font-size: 0.9375rem;
      display: flex;
      align-items: center;
    }

    #dag-empty-state[hidden] {
      display: none;
    }

    .dag-warning {
      position: absolute;
      left: 0.75rem;
      right: 4.75rem;
      top: 0.75rem;
      z-index: 3;
      padding: 0.4rem 0.6rem;
      border-radius: 6px;
      background: rgba(214, 69, 65, 0.12);
      color: #b23b37;
      font-size: 0.8125rem;
      line-height: 1.35;
      pointer-events: none;
    }

    .dag-reset-button {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      z-index: 4;
      padding: 0.35rem 0.6rem;
      font-size: 0.75rem;
      font-family: inherit;
      font-weight: 600;
      color: #4a90d9;
      background: rgba(255, 255, 255, 0.96);
      border: 1px solid #cfe0f5;
      border-radius: 999px;
      cursor: pointer;
    }

    .dag-reset-button:focus-visible {
      outline: 2px solid #4a90d9;
      outline-offset: 2px;
    }

    .dag-svg {
      width: 100%;
      height: 100%;
      display: block;
      touch-action: none;
      cursor: grab;
      background: linear-gradient(180deg, rgba(245, 247, 250, 0.45), rgba(255, 255, 255, 0));
    }

    .dag-svg.is-panning {
      cursor: grabbing;
    }

    .dag-edge-path {
      stroke: #9aa1aa;
      stroke-width: 1.5px;
      fill: none;
      transition: stroke 0.15s, stroke-width 0.15s, opacity 0.15s;
    }

    .dag-edge-path.is-highlighted {
      stroke: #4a90d9;
      stroke-width: 2px;
    }

    .dag-edge-path.is-cycle {
      stroke: #d64541;
      stroke-dasharray: 6 4;
    }

    .dag-edge-path.is-dimmed {
      opacity: 0.28;
    }

    .dag-node {
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .dag-node.is-dimmed {
      opacity: 0.45;
    }

    .dag-node-outline {
      fill: none;
      stroke: transparent;
      stroke-width: 2px;
      pointer-events: none;
    }

    .dag-node.is-selected .dag-node-outline,
    .dag-node.is-connected .dag-node-outline,
    .dag-node.is-focused .dag-node-outline,
    .dag-node:focus-visible .dag-node-outline {
      stroke: #4a90d9;
    }

    .dag-node-body {
      stroke-width: 1px;
      filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.08));
    }

    .dag-node-label {
      font-size: 13px;
      font-weight: 600;
      dominant-baseline: middle;
      pointer-events: none;
    }

    .dag-node-strike {
      stroke-width: 1.5px;
      pointer-events: none;
    }

    .dag-tooltip {
      position: absolute;
      z-index: 5;
      min-width: 180px;
      max-width: min(280px, calc(100% - 1rem));
      padding: 0.5rem 0.625rem;
      background: rgba(26, 26, 26, 0.96);
      color: #fff;
      border-radius: 6px;
      font-size: 0.8125rem;
      line-height: 1.4;
      pointer-events: none;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.18);
    }

    .dag-tooltip strong {
      display: block;
      margin-bottom: 0.2rem;
      font-size: 0.875rem;
    }

    @keyframes task-row-flash {
      0% {
        box-shadow: 0 0 0 0 rgba(74, 144, 217, 0.45);
      }
      35% {
        box-shadow: 0 0 0 4px rgba(74, 144, 217, 0.2);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(74, 144, 217, 0);
      }
    }

    @media (max-width: 479px) {
      #dependency-graph-section {
        width: calc(100vw - 1rem);
      }

      .dependency-graph-helper {
        display: none;
      }

      .dependency-graph-header {
        align-items: flex-start;
      }

      #dependency-graph {
        height: 220px;
      }

      #dag-empty-state {
        min-height: 120px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Todos</h1>
    </header>

    <main>
      <form class="input-row" id="add-form" aria-label="Add a new todo">
        <label for="todo-input">New todo</label>
        <input
          type="text"
          id="todo-input"
          placeholder="What needs to be done?"
          autocomplete="off"
        >
        <button type="submit" id="add-btn">Add</button>
      </form>

      <p id="empty-state" role="status">No todos yet. Add one above!</p>

      <ul id="todo-list" aria-label="Todo list"></ul>
    </main>

    <footer>
      <button type="button" id="clear-finished-btn" disabled>Clear finished</button>
    </footer>

    <section id="dependency-graph-section" aria-labelledby="dependency-graph-title">
      <div class="dependency-graph-header">
        <div class="dependency-graph-title-group">
          <h2 id="dependency-graph-title">Dependencies</h2>
          <p class="dependency-graph-helper">How tasks block each other</p>
        </div>
        <button type="button" id="dag-toggle" aria-expanded="false">Show graph</button>
      </div>
      <div id="dependency-graph" aria-label="Task dependency graph"></div>
      <p id="dag-empty-state" role="status" hidden>No task dependencies yet. Blocked tasks will appear here once you link them.</p>
    </section>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
